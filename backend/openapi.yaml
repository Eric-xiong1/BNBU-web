openapi: 3.0.3
info:
  title: BNBU Sports Grade Web API
  version: 0.1.0
  description: Teacher/admin/organization-manager Web API contract for the BNBU sports grade management MVP.
servers:
  - url: https://api.example.com/api
    description: Production placeholder
  - url: http://127.0.0.1:8080/api
    description: Local development placeholder
tags:
  - name: Auth
  - name: Student
  - name: Teacher
  - name: Reviews
  - name: Scores
  - name: Export
  - name: Admin
  - name: Organizations
  - name: Delivery
  - name: Logs
security:
  - bearerAuth: []
paths:
  /server-time:
    get:
      tags: [System]
      summary: Get the authoritative server clock for task-window decisions
      security: []
      responses:
        '200':
          description: Server time in UTC
          content:
            application/json:
              schema:
                type: object
                required: [time, timezone, unixMs]
                properties:
                  time:
                    type: string
                    format: date-time
                  timezone:
                    type: string
                    example: Asia/Shanghai
                  unixMs:
                    type: integer
                    format: int64
  /upload/proof:
    post:
      tags: [Student]
      summary: Upload up to six proof images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  maxItems: 6
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Uploaded image metadata
          content:
            application/json:
              schema:
                type: object
                required: [files, urls, count]
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      required: [url, mediaType, mimeType, size]
                      properties:
                        url:
                          type: string
                          pattern: '^/uploads/'
                        mediaType:
                          type: string
                          enum: [image]
                        mimeType:
                          type: string
                          enum: [image/jpeg, image/png, image/webp, image/heic, image/heif]
                        size:
                          type: integer
                          maximum: 8388608
                  urls:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login to the Web console
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, password, role]
              properties:
                account:
                  type: string
                  example: teacher@bnbu.edu.cn
                password:
                  type: string
                  format: password
                role:
                  $ref: '#/components/schemas/Role'
      responses:
        '200':
          description: Login result
          content:
            application/json:
              schema:
                type: object
                required: [token, user, defaultRoute]
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  defaultRoute:
                    type: string
                    example: teacher-dashboard
        '401':
          $ref: '#/components/responses/Error'
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current Web user and route permission
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                type: object
                required: [user, routes]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  routes:
                    type: array
                    items:
                      type: string

  /teacher/courses:
    get:
      tags: [Teacher]
      summary: List courses visible to current teacher
      responses:
        '200':
          description: Courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
  /teacher/courses/{courseId}/dashboard:
    get:
      tags: [Teacher]
      summary: Get course dashboard metrics
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseMetrics'
  /teacher/courses/{courseId}/students:
    get:
      tags: [Teacher]
      summary: Get course roster
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [all, complete, incomplete, risk]
      responses:
        '200':
          description: Course students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentProgress'
  /teacher/courses/{courseId}/students/import/preview:
    post:
      tags: [Teacher]
      summary: Preview roster CSV import
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RosterImportPreview'
        '422':
          $ref: '#/components/responses/Error'
  /teacher/courses/{courseId}/students/import/confirm:
    post:
      tags: [Teacher]
      summary: Confirm valid roster import rows
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rows]
              properties:
                rows:
                  type: array
                  items:
                    $ref: '#/components/schemas/RosterImportRow'
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'

  /teacher/courses/{courseId}/tasks:
    get:
      tags: [Teacher]
      summary: List course tasks
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseTask'
    post:
      tags: [Teacher]
      summary: Create a course task
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseTaskInput'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseTask'
  /teacher/tasks/{taskId}:
    patch:
      tags: [Teacher]
      summary: Publish or close a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseTask'
    delete:
      tags: [Teacher]
      summary: Delete a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /teacher/courses/{courseId}/reviews:
    get:
      tags: [Reviews]
      summary: List check-in review records
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - name: status
          in: query
          schema:
            type: string
            enum: [open, safe, risk, closed, all]
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewRecord'
  /teacher/reviews/{reviewId}/decision:
    put:
      tags: [Reviews]
      summary: Review a check-in submission
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, approvedHours]
              properties:
                decision:
                  type: string
                  enum: [approve, reject, supplement]
                approvedHours:
                  type: number
                  minimum: 0
                  maximum: 2
                comment:
                  type: string
      responses:
        '200':
          description: Updated review and affected student progress
          content:
            application/json:
              schema:
                type: object
                required: [review, student]
                properties:
                  review:
                    $ref: '#/components/schemas/ReviewRecord'
                  student:
                    $ref: '#/components/schemas/StudentProgress'

  /teacher/courses/{courseId}/scores/exam:
    put:
      tags: [Scores]
      summary: Batch save special exam scores
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamScoreBatch'
      responses:
        '200':
          $ref: '#/components/responses/BatchSaved'
  /teacher/courses/{courseId}/scores/attendance:
    put:
      tags: [Scores]
      summary: Batch save attendance and performance scores
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceScoreBatch'
      responses:
        '200':
          $ref: '#/components/responses/BatchSaved'
  /teacher/courses/{courseId}/scores/physical:
    put:
      tags: [Scores]
      summary: Batch save physical test source data and converted score
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhysicalScoreBatch'
      responses:
        '200':
          $ref: '#/components/responses/BatchSaved'
  /teacher/courses/{courseId}/grades:
    get:
      tags: [Scores]
      summary: Get final grade table for a course
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - name: mode
          in: query
          schema:
            type: string
            enum: [raw, converted, percent]
            default: percent
        - name: sort
          in: query
          schema:
            type: string
            enum: [import, studentId, name]
            default: import
      responses:
        '200':
          description: Grade rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeRow'

  /teacher/courses/{courseId}/export/precheck:
    get:
      tags: [Export]
      summary: Get export blocking issues
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Export issues
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportIssues'
  /teacher/courses/{courseId}/export:
    get:
      tags: [Export]
      summary: Download final course grade export
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
        - name: mode
          in: query
          schema:
            type: string
            enum: [raw, converted, percent]
            default: percent
        - name: sort
          in: query
          schema:
            type: string
            enum: [import, studentId, name]
            default: import
      responses:
        '200':
          description: Export file
          content:
            text/csv:
              schema:
                type: string
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '409':
          $ref: '#/components/responses/Error'
  /teacher/courses/{courseId}/delivery:
    post:
      tags: [Delivery]
      summary: Submit course precheck to sports department admin
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Delivery record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryRecord'

  /admin/overview:
    get:
      tags: [Admin]
      summary: Get school-wide course health rows
      responses:
        '200':
          description: School overview
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseHealthRow'
  /admin/semesters:
    get:
      tags: [Admin]
      summary: List semesters
      responses:
        '200':
          description: Semesters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Semester'
    post:
      tags: [Admin]
      summary: Create semester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemesterInput'
      responses:
        '201':
          description: Created semester
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Semester'
  /admin/courses:
    get:
      tags: [Admin]
      summary: List all managed courses
      responses:
        '200':
          description: Courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminCourse'
    post:
      tags: [Admin]
      summary: Create course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCourseInput'
      responses:
        '201':
          description: Created course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCourse'
  /admin/users:
    get:
      tags: [Admin]
      summary: List Web users
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [Admin]
      summary: Create Web user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /admin/sport-rules:
    get:
      tags: [Admin]
      summary: Get current sports hour rule
      responses:
        '200':
          description: Rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SportRule'
    put:
      tags: [Admin]
      summary: Save sports hour rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SportRule'
      responses:
        '200':
          description: Saved rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SportRule'
  /admin/grade-rules:
    get:
      tags: [Admin]
      summary: Get grade weights
      responses:
        '200':
          description: Grade rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeRule'
    put:
      tags: [Admin]
      summary: Save grade weights
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GradeRule'
      responses:
        '200':
          description: Saved grade rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeRule'
        '422':
          $ref: '#/components/responses/Error'
  /admin/conversion-rules:
    get:
      tags: [Admin]
      summary: Get physical test conversion rules
      responses:
        '200':
          description: Conversion rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversionRule'
    post:
      tags: [Admin]
      summary: Add physical test conversion rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversionRuleInput'
      responses:
        '201':
          description: Created conversion rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversionRule'
  /admin/export-template:
    get:
      tags: [Admin]
      summary: Get export template
      responses:
        '200':
          description: Export template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportTemplate'
    put:
      tags: [Admin]
      summary: Save export template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportTemplate'
      responses:
        '200':
          description: Saved export template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportTemplate'

  /admin/organizations:
    get:
      tags: [Organizations]
      summary: List teams or clubs
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [team, club]
      responses:
        '200':
          description: Organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
    post:
      tags: [Organizations]
      summary: Create team or club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationInput'
      responses:
        '201':
          description: Created organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
  /manager/memberships:
    get:
      tags: [Organizations]
      summary: List memberships visible to organization manager
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [team, club]
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/MembershipStatus'
      responses:
        '200':
          description: Memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membership'
    post:
      tags: [Organizations]
      summary: Create a membership certification row
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembershipInput'
      responses:
        '201':
          description: Created membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
  /manager/memberships/import/preview:
    post:
      tags: [Organizations]
      summary: Preview team or club member import
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, file]
              properties:
                type:
                  type: string
                  enum: [team, club]
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipImportPreview'
  /manager/memberships/import/confirm:
    post:
      tags: [Organizations]
      summary: Confirm valid team or club member import rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, rows]
              properties:
                type:
                  type: string
                  enum: [team, club]
                rows:
                  type: array
                  items:
                    $ref: '#/components/schemas/MembershipImportRow'
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
  /manager/memberships/{membershipId}/decision:
    put:
      tags: [Organizations]
      summary: Manager approves or rejects a membership certification
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject]
                comment:
                  type: string
      responses:
        '200':
          description: Updated membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
  /admin/memberships/{membershipId}/decision:
    put:
      tags: [Organizations]
      summary: Admin confirms or changes organization offset
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [confirm-member, force-offset, revoke-offset]
                comment:
                  type: string
      responses:
        '200':
          description: Updated membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'

  /admin/deliveries:
    get:
      tags: [Delivery]
      summary: List course grade delivery records
      responses:
        '200':
          description: Delivery records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryRecord'
  /admin/deliveries/{courseId}/decision:
    put:
      tags: [Delivery]
      summary: Archive, return, or remind a course delivery
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [archive, return, remind]
                comment:
                  type: string
      responses:
        '200':
          description: Updated delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryRecord'
        '409':
          $ref: '#/components/responses/Error'

  /admin/logs:
    get:
      tags: [Logs]
      summary: List audit logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  nextCursor:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
      example: gepe
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BatchSaved:
      description: Batch save result
      content:
        application/json:
          schema:
            type: object
            required: [savedCount]
            properties:
              savedCount:
                type: integer
              updatedAt:
                type: string
                example: 2026.06.12 11:30
  schemas:
    Role:
      type: string
      enum: [teacher, admin, manager]
    Status:
      type: string
      example: 正常
    User:
      type: object
      required: [id, name, email, role, scope, status]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          example: 体育任课老师
        scope:
          type: string
          example: GEPE101
        status:
          $ref: '#/components/schemas/Status'
    UserInput:
      type: object
      required: [name, email, role, scope]
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        scope:
          type: string
    Course:
      type: object
      required: [id, code, section, name, semester]
      properties:
        id:
          type: string
          example: gepe
        code:
          type: string
          example: GEPE101
        section:
