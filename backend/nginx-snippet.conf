# ── BNBU Sports API V1 — Nginx reverse proxy snippet ──
# Paste this INSIDE the server { } block for your site (port 96).
#
# 宝塔 → 网站 → 123.207.5.70:96 → 配置文件
# Find the existing `location / { ... }` block, keep it as-is,
# then ADD the `location /api/ { ... }` block right after it.
#
# Your API runs on port 3001 — teammate's V2 uses 3000. No conflict.

location /api/ {
    # Forward /api/* to your V1 Node.js backend on port 3001
    proxy_pass http://127.0.0.1:3001;

    # Standard reverse proxy headers
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Timeouts
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;

    # Six proof images, each up to 8MB (leave room for multipart overhead).
    client_max_body_size 50m;
}

# ★ Serve uploaded proof images directly via Nginx (bypass Node.js)
location /uploads/ {
    alias /www/wwwroot/bnbu-api-v1/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

